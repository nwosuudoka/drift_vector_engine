syntax = "proto3";

package drift;

// The Drift Vector Database Service
service Drift {
  // Lightweight server readiness endpoint.
  rpc Health (HealthRequest) returns (HealthResponse);

  // Creates (or validates) a collection with explicit metric and dimension.
  rpc CreateCollection (CreateCollectionRequest) returns (CreateCollectionResponse);

  // Create payload schema definitions for a collection.
  rpc CreatePayloadSchema (CreatePayloadSchemaRequest) returns (PayloadSchemaResponse);

  // Replace existing payload schema definitions for a collection.
  rpc UpdatePayloadSchema (UpdatePayloadSchemaRequest) returns (PayloadSchemaResponse);

  // Fetch payload schema definitions for a collection.
  rpc GetPayloadSchema (GetPayloadSchemaRequest) returns (GetPayloadSchemaResponse);

  // Validate payload rows against the currently registered schema.
  rpc ValidatePayload (ValidatePayloadRequest) returns (ValidatePayloadResponse);

  // Inserts a vector into an index.
  rpc Insert (InsertRequest) returns (InsertResponse);

  rpc InsertBatch (InsertBatchRequest) returns (InsertResponse); 

  // Searches for the nearest neighbors.
  rpc Search (SearchRequest) returns (SearchResponse);

  // Batch train a collection (runs K-Means and initializes quantization)
  rpc Train (TrainRequest) returns (TrainResponse);
}

// --- Messages ---

message HealthRequest {}

message NvmeCacheMetrics {
  bool enabled = 1;
  uint64 hits = 2;
  uint64 misses = 3;
  uint64 remote_fetches = 4;
  uint64 singleflight_waits = 5;
  uint64 evictions = 6;
  uint64 bytes_cached = 7;
  uint64 bytes_evicted = 8;
  uint64 invalidations = 9;
  uint64 fingerprint_mismatches = 10;
  uint64 recovered_entries = 11;
}

message RecoveryGuardMetrics {
  uint64 mismatches_detected = 1;
  uint64 invalidations_performed = 2;
  uint64 fail_fast_aborts = 3;
  uint64 payload_index_mismatches_detected = 4;
  uint64 payload_index_validation_errors = 5;
}

message HealthResponse {
  bool ready = 1;
  string version = 2;
  NvmeCacheMetrics nvme_cache = 3;
  RecoveryGuardMetrics recovery_guard = 4;
}

enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_L2 = 1;
  METRIC_TYPE_COSINE = 2;
}

message CreateCollectionRequest {
  string collection_name = 1;
  uint32 dim = 2;
  MetricType metric = 3;
  uint32 max_bucket_capacity = 4; // 0 => server default
}

message CreateCollectionResponse {
  bool success = 1;
}

message Vector {
  uint64 id = 1;
  repeated float values = 2;
}

message PayloadLobRef {
  string blob_key = 1;
  uint64 offset = 2;
  uint64 length = 3;
  string fingerprint = 4;
}

message PayloadValue {
  oneof kind {
    bool bool_value = 1;
    sint64 int64_value = 2;
    float float32_value = 3;
    double float64_value = 4;
    string keyword_value = 5;
    string text_value = 6;
    bytes bytes_value = 7;
    sint64 timestamp_micros_value = 8;
    PayloadLobRef lob_ref_value = 9;
    bool null_value = 10;
  }
}

message PayloadRow {
  map<uint32, PayloadValue> fields = 1;
}

enum PayloadLogicalType {
  PAYLOAD_LOGICAL_TYPE_UNSPECIFIED = 0;
  PAYLOAD_LOGICAL_TYPE_BOOL = 1;
  PAYLOAD_LOGICAL_TYPE_INT64 = 2;
  PAYLOAD_LOGICAL_TYPE_FLOAT32 = 3;
  PAYLOAD_LOGICAL_TYPE_FLOAT64 = 4;
  PAYLOAD_LOGICAL_TYPE_KEYWORD = 5;
  PAYLOAD_LOGICAL_TYPE_TEXT = 6;
  PAYLOAD_LOGICAL_TYPE_BYTES = 7;
  PAYLOAD_LOGICAL_TYPE_TIMESTAMP_MICROS = 8;
  PAYLOAD_LOGICAL_TYPE_LOB_REF = 9;
}

message PayloadFieldDefinition {
  uint32 field_id = 1;
  string name = 2;
  PayloadLogicalType logical_type = 3;
  bool nullable = 4;
  bool indexed = 5;
}

message PayloadSchemaDefinition {
  repeated PayloadFieldDefinition fields = 1;
}

message CreatePayloadSchemaRequest {
  string collection_name = 1;
  PayloadSchemaDefinition schema = 2;
}

message UpdatePayloadSchemaRequest {
  string collection_name = 1;
  PayloadSchemaDefinition schema = 2;
}

message GetPayloadSchemaRequest {
  string collection_name = 1;
}

message PayloadSchemaResponse {
  bool success = 1;
  PayloadSchemaDefinition schema = 2;
}

message GetPayloadSchemaResponse {
  bool found = 1;
  PayloadSchemaDefinition schema = 2;
}

message ValidatePayloadRequest {
  string collection_name = 1;
  repeated PayloadRow rows = 2;
}

message ValidatePayloadResponse {
  bool valid = 1;
  repeated string errors = 2;
}

message InsertRequest {
  string collection_name = 1; 
  Vector vector = 2;
  PayloadRow payload = 3;
}

message InsertResponse {
  bool success = 1;
}


message InsertBatchRequest {
  string collection_name = 1;
  repeated Vector vectors = 2;
  repeated PayloadRow payload_rows = 3;
}

message PayloadValueList {
  repeated PayloadValue values = 1;
}

message RangeFilter {
  PayloadValue lower = 1;
  optional bool lower_inclusive = 2;
  PayloadValue upper = 3;
  optional bool upper_inclusive = 4;
}

message FieldFilter {
  uint32 field_id = 1;
  oneof condition {
    PayloadValue exact = 2;
    PayloadValueList any_of = 3;
    RangeFilter range = 4;
  }
}

message SearchRequest {
  string collection_name = 1;
  repeated float vector = 2;
  uint32 k = 3; // Top-K results

  // New Drift Parameters (Optional)
  // If 0 or missing, server uses defaults.
  float target_confidence = 4; // e.g. 0.95
  float lambda = 5;            // e.g. 25.0
  float tau = 6;               // e.g. 100.0
  repeated FieldFilter filters = 7;
  repeated uint32 payload_projection_fields = 8;
}

message SearchResult {
  uint64 id = 1;
  float score = 2; // Distance or similarity score
  PayloadRow payload = 3;
}

message SearchResponse {
  repeated SearchResult results = 1;
}


message TrainRequest {
  string collection_name = 1;
  repeated Vector vectors = 2;
}

message TrainResponse {
  bool success = 1;
}
